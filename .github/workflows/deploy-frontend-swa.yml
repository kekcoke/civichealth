name: Deploy Public Frontend (Azure SWA)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/portal-shell/**'
      - 'apps/lgu-civic/**'
      - 'libs/shared-ui/**'
      - 'package.json'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by Nx to compare against previous commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Affected Frontend Applications
        run: npx nx affected:build --target=portal-shell,lgu-civic --configuration=production --base=HEAD~1 --head=HEAD

      - name: Deploy Portal Shell to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_PORTAL_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist/apps/portal-shell"
          skip_app_build: true # App is already built by Nx
